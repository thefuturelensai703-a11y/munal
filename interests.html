        <style>/* Interests Page Styling */
.interests-page {
    background: linear-gradient(to right, #ffecd2, #fcb69f);
}

/* Different heading style */
.interests-page h1 {
    color: #d35400;
    font-size: 36px;
}

/* Style list differently */
.interests-page ul {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    padding: 20px;
}

/* Interest cards */
.interests-page ul li {
    background-color: white;
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    font-weight: bold;
    transition: 0.3s;
    border-left: 5px solid #e67e22;
}

/* Hover effect */
.interests-page ul li:hover {
    background-color: #e67e22;
    color: white;
    transform: translateY(-5px);
}

/* Style the back link */
.interests-page p a {
    display: block;
    text-align: center;
    margin-top: 20px;
    color: #d35400;
    font-weight: bold;
    text-decoration: none;
}

.interests-page p a:hover {
    text-decoration: underline;
}</style>
